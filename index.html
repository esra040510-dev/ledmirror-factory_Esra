.fav-actions .fav-close:hover { background: var(--border-soft); }

/* ============================================================
       13. Catalog弹窗
       ============================================================ */
.catalog-list {
    max-height:360px; overflow-y:auto; background: var(--bg-body); border-radius:10px;
    padding:12px 16px; font-size:13px; font-family:monospace; white-space:pre-wrap; word-break:break-all;
    margin-bottom:16px; border:1px solid var(--border-soft); color: var(--text-body);
}
.catalog-actions { display:flex; gap:10px; flex-wrap:wrap; }
.catalog-actions button {
    padding:8px 20px; border-radius:10px; border:none; font-size:14px; cursor:pointer; transition: var(--transition);
}
.catalog-actions .catalog-copy { background: var(--primary); color:#fff; }
.catalog-actions .catalog-copy:hover { background: var(--primary-light); }
.catalog-actions .catalog-close { background: var(--bg-soft); color: var(--text-muted); }
.catalog-actions .catalog-close:hover { background: var(--border-soft); }

/* ============================================================
       14. 工厂相册 & 证书
       ============================================================ */
.gallery-section { margin:40px 0 30px; }
.gallery-section h2 {
    font-size:24px; color: var(--primary-dark); margin-bottom:16px; text-align:center;
}
.gallery-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap:14px;
}
.gallery-grid .gallery-item {
    border-radius:12px; overflow:hidden; aspect-ratio:4/3;
    background: var(--bg-soft); display:flex; align-items:center; justify-content:center;
    border:1px solid var(--border-soft);
}
.gallery-grid .gallery-item img { width:100%; height:100%; object-fit:cover; }
.gallery-grid .gallery-item .noimg-svg { width:60px; height:60px; fill:#c890a0; }
.cert-grid {
    display:flex; flex-wrap:wrap; gap:20px; justify-content:center; margin-top:16px;
}
.cert-card {
    background: var(--bg-card); border-radius:12px; padding:16px 24px; border:1px solid var(--border-soft);
    text-align:center; min-width:120px; box-shadow: var(--shadow-sm);
}
.cert-card .cert-icon { font-size:36px; display:block; margin-bottom:6px; }
.cert-card .cert-name { font-size:14px; font-weight:600; color: var(--primary-dark); }

/* ============================================================
       15. FAQ & Footer
       ============================================================ */
.faq-section {
    margin:40px 0 30px; border-top:1px solid var(--border-color); padding-top:30px;
}
.faq-section h2 {
    font-size:24px; color: var(--primary-dark); margin-bottom:18px; text-align:center;
}
.faq-item { border-bottom:1px solid var(--border-soft); padding:14px 0; }
.faq-item .faq-q {
    font-size:16px; font-weight:600; color: var(--primary-dark); cursor:pointer;
    display:flex; justify-content:space-between; align-items:center;
}
.faq-item .faq-q .arrow { transition:transform 0.3s; font-size:18px; }
.faq-item .faq-q.open .arrow { transform:rotate(180deg); }
.faq-item .faq-a {
    font-size:14px; color: var(--text-muted); padding-top:6px; display:none; line-height:1.7;
}
.faq-item .faq-a.open { display:block; }
footer {
    margin-top:60px; padding-top:32px; border-top:1px solid var(--border-color); color: var(--text-muted); font-size:14px;
}
.footer-grid {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:30px; text-align:left; margin-bottom:24px;
}
.footer-grid .footer-col h4 { color: var(--primary-dark); margin-bottom:12px; font-size:16px; }
.footer-grid .footer-col ul { list-style:none; }
.footer-grid .footer-col li { margin-bottom:6px; font-size:13px; }
.footer-grid .footer-col .social-icons { display:flex; gap:12px; margin-top:8px; }
.footer-grid .footer-col .social-icons a {
    color: var(--primary); font-size:22px; text-decoration:none; transition: var(--transition);
}
.footer-grid .footer-col .social-icons a:hover { color: var(--primary-light); transform:translateY(-2px); }
.copy-text { color: var(--primary); text-decoration:underline; cursor:pointer; transition:color 0.2s; }
.copy-text:hover { color: var(--primary-light); }
.copyright {
    text-align:center; padding-top:16px; border-top:1px solid var(--border-color); font-size:13px;
}

/* ============================================================
       16. Toast提示
       ============================================================ */
.copy-toast {
    position:fixed; left:50%; bottom:140px; transform:translateX(-50%);
    background:rgba(0,0,0,0.75); color:#fff;
    padding:10px 28px; border-radius:10px; font-size:14px; z-index:9999;
    opacity:0; transition:opacity 0.3s ease; pointer-events:none;
}
.copy-toast.show { opacity:1; }

/* ============================================================
       17. 悬浮WhatsApp & 返回顶部
       ============================================================ */
.float-whatsapp {
    position:fixed; bottom:90px; right:24px;
    width:56px; height:56px; border-radius:50%;
    background: var(--whatsapp); color:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(37,211,102,0.4); z-index:99; font-size:28px;
    transition: var(--transition); text-decoration:none;
    animation:pulse-wa 2s infinite;
}
@keyframes pulse-wa {
    0% { box-shadow:0 0 0 0 rgba(37,211,102,0.4); }
    70% { box-shadow:0 0 0 14px rgba(37,211,102,0); }
    100% { box-shadow:0 0 0 0 rgba(37,211,102,0); }
}
.float-whatsapp:hover {
    transform:scale(1.1); box-shadow:0 6px 20px rgba(37,211,102,0.5); animation:none;
}
.back-top {
    position:fixed; bottom:30px; right:24px;
    width:46px; height:46px; border-radius:50%;
    background: var(--primary); color:#fff; border:none;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 12px rgba(145,40,75,0.3); opacity:0; visibility:hidden;
    transition: var(--transition); z-index:99; font-size:18px; cursor:pointer;
}
.back-top.show { opacity:1; visibility:visible; }
.back-top:hover { background: var(--primary-light); transform:translateY(-3px); }

/* ============================================================
       18. 响应式适配
       ============================================================ */
@media (max-width:1024px) and (min-width:768px) {

for(let i = 1; i <= 198; i++){
    const cId = 'C' + String(i).padStart(3, '0');
    const sizeList = Object.keys(sizePriceMap);
    const targetSize = sizeList[i % sizeList.length];
    const woodPrice = sizePriceMap[targetSize];
    const pvcPrice = (woodPrice * CONFIG.PVC_PRICE_RATIO).toFixed(2);

    ALL_PRODUCTS.push({
        id: cId,
        category: 'pvc-cabinet',
        name: `${cId} PVC Waterproof Mirror Cabinet`,
        desc: `Material: Eco PVC Waterproof Frame\nSize:${targetSize} | Moisture Proof\nMOQ:200pcs | Warranty:2Y`,
        basePrice: Number(pvcPrice),
        imgUrl: `/img/${cId}.jpg`
    });
}

// ====================== 页面初始化逻辑 ======================
function initPage(){
    // 暗黑模式初始化
    if(darkThemeSwitch){
        document.documentElement.setAttribute('data-theme','dark');
        document.querySelector('.theme-toggle').innerText = '☀️';
    }else{
        document.documentElement.removeAttribute('data-theme');
        document.querySelector('.theme-toggle').innerText = '🌙';
    }
    setLang(siteLang);
    renderProductList();
    bindGlobalEvents();
    renderFavList();
}

// 渲染产品列表、筛选、分页
function renderProductList(){
    let filterArr = [...ALL_PRODUCTS];
    // 分类筛选
    if(filterType === 'led-mirror') filterArr = filterArr.filter(p => p.category === 'led-mirror');
    if(filterType === 'wood-cabinet') filterArr = filterArr.filter(p => p.category === 'wood-cabinet');
    if(filterType === 'pvc-cabinet') filterArr = filterArr.filter(p => p.category === 'pvc-cabinet');

    // 搜索过滤
    if(searchText.trim()){
        const kw = searchText.toLowerCase();
        filterArr = filterArr.filter(p =>
            p.id.toLowerCase().includes(kw) ||
            p.name.toLowerCase().includes(kw) ||
            p.desc.toLowerCase().includes(kw)
        );
    }

    // 价格区间过滤
    if(minPriceVal) filterArr = filterArr.filter(p => p.basePrice >= Number(minPriceVal));
    if(maxPriceVal) filterArr = filterArr.filter(p => p.basePrice <= Number(maxPriceVal));

    // 价格排序
    if(sortRule === 'price-asc') filterArr.sort((a,b) => a.basePrice - b.basePrice);
    if(sortRule === 'price-desc') filterArr.sort((a,b) => b.basePrice - a.basePrice);

    const total = filterArr.length;
    const totalPage = Math.ceil(total / CONFIG.PER_PAGE_NUM);
    if(pageIndex > totalPage && totalPage > 0) pageIndex = totalPage;
    const startIdx = (pageIndex - 1) * CONFIG.PER_PAGE_NUM;
    const pageData = filterArr.slice(startIdx, startIdx + CONFIG.PER_PAGE_NUM);

    const gridWrap = document.querySelector('.product-grid');
    if(total === 0){
        gridWrap.innerHTML = `<div class="empty-state show"><span>🔍</span>No matching products found</div>`;
    }else{
        gridWrap.innerHTML = pageData.map(p=>{
            const isFav = favStorageList.includes(p.id);
            const isBatch = batchSelectSet.has(p.id);
            return `
            <div class="product-card" data-id="${p.id}">
                <div class="model-tag">${p.id}</div>
                <input type="checkbox" class="product-check" ${isBatch?'checked':''}>
                <button class="favorite-btn ${isFav?'active':''}">♥</button>
                <div class="img-box">
                    <img class="product-img" src="${p.imgUrl}" loading="lazy" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=img-placeholder><svg viewBox=0 0 24 24><path d=M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-4-4h-4v-2h2c1.1 0 2-.89 2-2V9c0-1.11-.9-2-2-2H9v2h4v2h-2c-1.1 0-2 .89-2 2v4h6v-2z/></svg></div>'">
                </div>
                <div class="product-info">
                    <h3 class="product-name">${p.name}</h3>
                    <p class="product-desc">${p.desc}</p>
                    <div class="product-price">$${p.basePrice}</div>
                    <div class="card-actions">
                        <button class="order-btn detail-btn">View Details</button>
                        <button class="quick-whatsapp">💬</button>
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }
    document.querySelector('.result-count').innerText = `${total} Products`;
    renderPagination(total, totalPage);
    refreshBatchBar();
}

// 批量选择底部留白处理
function refreshBatchBar(){
    const batchBar = document.querySelector('.batch-bar');
    const batchCount = batchSelectSet.size;
    const bodyDom = document.body;
    if(batchCount > 0){
        batchBar.classList.add('show');
        bodyDom.classList.add('batch-open');
        document.querySelector('.batch-info').innerHTML = `Selected: <strong>${batchCount}</strong> items`;
    }else{
        batchBar.classList.remove('show');
        bodyDom.classList.remove('batch-open');
    }
}

// 全局事件绑定
function bindGlobalEvents(){
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', e=>{
        searchText = e.target.value;
        pageIndex = 1;
        renderProductList();
    });

    document.querySelectorAll('.filter-tab').forEach(tab=>{
        tab.addEventListener('click',()=>{
            document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
            tab.classList.add('active');
            filterType = tab.dataset.type;
            pageIndex = 1;
            renderProductList();
        });
    });

    document.querySelector('.theme-toggle').addEventListener('click',()=>{
        darkThemeSwitch = !darkThemeSwitch;
        localStorage.setItem('yl_dark', darkThemeSwitch);
        initPage();
    });

    document.querySelectorAll('.lang-switch button').forEach(btn=>{
        btn.addEventListener('click',()=>{
            setLang(btn.dataset.lang);
        });
    });

    // 产品卡片委托事件
    document.querySelector('.product-grid').addEventListener('click',e=>{
        const card = e.target.closest('.product-card');
        if(!card) return;
        const pid = card.dataset.id;
        const prod = ALL_PRODUCTS.find(p=>p.id === pid);

        if(e.target.classList.contains('favorite-btn')){
            if(favStorageList.includes(pid)){
                favStorageList = favStorageList.filter(id=>id !== pid);
                e.target.classList.remove('active');
            }else{
                favStorageList.push(pid);
                e.target.classList.add('active');
            }
            localStorage.setItem('yl_fav', JSON.stringify(favStorageList));
            renderFavList();
            return;
        }
        if(e.target.classList.contains('product-check')){
            e.target.checked ? batchSelectSet.add(pid) : batchSelectSet.delete(pid);
            refreshBatchBar();
            return;
        }
        if(e.target.classList.contains('detail-btn')){
            openDetailModal(prod);
            return;
        }
        if(e.target.classList.contains('quick-whatsapp')){
            const waUrl = `https://wa.me/${CONFIG.WHATSAPP_NUM}?text=Hello, I want to inquire product ${prod.id}: ${prod.name}, Price $${prod.basePrice}`;
            window.open(waUrl,'_blank');
            return;
        }
    });

    // 批量操作按钮
    document.querySelector('.batch-copy').addEventListener('click',()=>{
        const copyText = Array.from(batchSelectSet).map(id=>{
            const p = ALL_PRODUCTS.find(x=>x.id === id);
            return `${p.id} | ${p.name} | $${p.basePrice}`;
        }).join('\n');
        navigator.clipboard.writeText(copyText).then(()=>showToast('Copied all selected model numbers'));
    });
    document.querySelector('.batch-whatsapp').addEventListener('click',()=>{
        const listText = Array.from(batchSelectSet).map(id=>{
            const p = ALL_PRODUCTS.find(x=>x.id === id);
            return `${p.id} ${p.name}`;
        }).join(', ');
        const waUrl = `https://wa.me/${CONFIG.WHATSAPP_NUM}?text=Inquiry batch products: ${listText}`;
        window.open(waUrl,'_blank');
    });
    document.querySelector('.batch-clear').addEventListener('click',()=>{
        batchSelectSet.clear();
        renderProductList();
    });

    // ESC关闭弹窗、弹窗点击遮罩关闭
    window.addEventListener('keydown',e=>{
        if(e.key === 'Escape') document.querySelectorAll('.modal-mask.show').forEach(m=>m.classList.remove('show'));
    });
    document.querySelectorAll('.modal-mask').forEach(mask=>{
        mask.addEventListener('click',e=>{
            if(e.target === mask) mask.classList.remove('show');
        });
        mask.querySelector('.close-modal').addEventListener('click',()=>mask.classList.remove('show'));
    });

    // 返回顶部按钮
    window.addEventListener('scroll',()=>{
        const backTopBtn = document.querySelector('.back-top');
        window.scrollY > 300 ? backTopBtn.classList.add('show') : backTopBtn.classList.remove('show');
    });
    document.querySelector('.back-top').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

    // 弹窗触发按钮
    document.querySelector('.oem-entry').addEventListener('click',()=>document.querySelector('#oemModal').classList.add('show'));
    document.querySelector('.catalog-entry').addEventListener('click',openCatalogModal);
    document.querySelector('.fav-entry').addEventListener('click',()=>document.querySelector('#favModal').classList.add('show'));
}

// 工具函数：语言切换
function setLang(lang){
    siteLang = lang;
    localStorage.setItem('yl_lang', lang);
    document.querySelectorAll('.lang-switch button').forEach(b=>{
        b.classList.toggle('active', b.dataset.lang === lang);
    });
}

// Toast提示
function showToast(msg){
    const toast = document.querySelector('.copy-toast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'), 2200);
}

// 产品详情弹窗
function openDetailModal(product){
    activeProductData = product;
    const modal = document.querySelector('#detailModal');
    modal.querySelector('.modal-title').innerText = `${product.id} ${product.name}`;
    modal.querySelector('.modal-text').innerText = product.desc;
    modal.querySelector('.meta-price').innerText = `USD $${product.basePrice}`;
    modal.querySelector('.wa-detail-btn').href = `https://wa.me/${CONFIG.WHATSAPP_NUM}?text=Detail inquiry for ${product.id}: ${product.name}`;
    modal.classList.add('show');
}

// 完整产品目录弹窗
function openCatalogModal(){
    const catalogWrap = document.querySelector('.catalog-list');
    const allText = ALL_PRODUCTS.map(p=>`${p.id} | ${p.name} | $${p.basePrice}`).join('\n');
    catalogWrap.innerText = allText;
    document.querySelector('#catalogModal').classList.add('show');
}

// 收藏列表渲染
function renderFavList(){
    const favWrap = document.querySelector('.fav-list');
    if(favStorageList.length === 0){
        favWrap.innerHTML = '<p>No favorite products yet</p>';
        return;
    }
    favWrap.innerHTML = favStorageList.map(id=>{
        const p = ALL_PRODUCTS.find(x=>x.id === id);
        return `
        <div class="fav-item">
            <span>${p.id} ${p.name}</span>
            <button class="fav-remove" data-id="${id}">✕</button>
        </div>
        `;
    }).join('');
    favWrap.querySelectorAll('.fav-remove').forEach(btn=>{
        btn.addEventListener('click',()=>{
            const delId = btn.dataset.id;
            favStorageList = favStorageList.filter(x=>x !== delId);
            localStorage.setItem('yl_fav', JSON.stringify(favStorageList));
            renderFavList();
            renderProductList();
        });
    });
}

// 页面加载完成执行初始化
window.addEventListener('DOMContentLoaded', initPage);
