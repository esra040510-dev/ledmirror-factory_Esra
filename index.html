// 工具函数
// ============================================================
function debounce(fn, delay) {
    let timer;
    return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
    };
}

function throttle(fn, limit) {
    let inThrottle = false;
    return function(...args) {
        if (!inThrottle) {
            fn.apply(this, args);
            inThrottle = true;
            setTimeout(() => inThrottle = false, limit);
        }
    };
}

function showToast(msg) {
    const t = document.getElementById('copyToast');
    if (!t) return;
    t.textContent = msg || 'Copied!';
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

function copyToClipboard(text, successMsg) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            showToast(successMsg || 'Copied!');
        }).catch(() => fallbackCopy(text, successMsg));
    } else {
        fallbackCopy(text, successMsg);
    }
}

function fallbackCopy(text, msg) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
        document.execCommand('copy');
        showToast(msg || 'Copied!');
    } catch (e) {
        showToast('Copy failed');
    }
    document.body.removeChild(ta);
}

const pageNext = document.getElementById('pageNext');

const batchBar = document.getElementById('batchBar');
const batchCount = document.getElementById('batchCount');
const priceMinEl = document.getElementById('priceMin');
const priceMaxEl = document.getElementById('priceMax');
const filterMoqEl = document.getElementById('filterMoq');
const sortSelect = document.getElementById('sortSelect');

// ============================================================
// 获取过滤和排序后的产品列表
// ============================================================
function getFilteredProducts() {
    let list = PRODUCTS;
    // 分类
    if (currentFilter !== 'all') {
        list = list.filter(p => p.type === currentFilter);
    }
    // 搜索
    if (searchKeyword.trim()) {
        const kw = searchKeyword.trim().toLowerCase();
        list = list.filter(p =>
            p.id.toLowerCase().includes(kw) ||
            p.name.toLowerCase().includes(kw) ||
            p.desc.toLowerCase().includes(kw)
        );
    }
    // 价格
    const min = parseFloat(priceMin);
    const max = parseFloat(priceMax);
    if (!isNaN(min) && min >= 0) {
        list = list.filter(p => {
            const val = parseFloat(p.price.replace('$', ''));
            return val >= min;
        });
    }
    if (!isNaN(max) && max >= 0) {
        list = list.filter(p => {
            const val = parseFloat(p.price.replace('$', ''));
            return val <= max;
        });
    }
    // MOQ
    if (filterMoq) {
        const moqVal = parseInt(filterMoq);
        list = list.filter(p => {
            const match = p.desc.match(/MOQ:\s*(\d+)/);
            if (match) return parseInt(match[1]) >= moqVal;
            return false;
        });
    }
    // 排序
    if (sortBy === 'price-asc') {
        list.sort((a, b) => parseFloat(a.price.replace('$', '')) - parseFloat(b.price.replace('$', '')));
    } else if (sortBy === 'price-desc') {
        list.sort((a, b) => parseFloat(b.price.replace('$', '')) - parseFloat(a.price.replace('$', '')));
    } else if (sortBy === 'model') {
        list.sort((a, b) => a.id.localeCompare(b.id));
    }
    return list;
}

// ============================================================
// 渲染产品（带分页，优先A/B）
// ============================================================
function renderProducts() {
    const list = getFilteredProducts();
    const total = list.length;
    const totalPages = Math.ceil(total / CONFIG.PER_PAGE) || 1;
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    // 优先A/B排序：A系列在前，B其次，C最后
    const sorted = list.slice().sort((a, b) => {
        const order = { 'A': 0, 'B': 1, 'C': 2 };
        return (order[a.type] || 3) - (order[b.type] || 3);
    });

    const start = (currentPage - 1) * CONFIG.PER_PAGE;
    const pageItems = sorted.slice(start, start + CONFIG.PER_PAGE);

    // 清空容器（保留空状态）
    container.querySelectorAll('.product-card').forEach(el => el.remove());
    emptyState.classList.remove('show');

    if (pageItems.length === 0) {
        emptyState.classList.add('show');
        resultCount.textContent = '0 products';
        updatePagination(total, totalPages);
        updateBatchBar();
        updateBreadcrumb();
        return;
    }

    let html = '';
    pageItems.forEach(item => {
        const isFav = favorites.includes(item.id);
        const checked = batchSelected.has(item.id) ? 'checked' : '';
        const imgSrc = item.img || '';
        const imgHtml = imgSrc ?
            `<img class="product-img" src="${imgSrc}" alt="${item.id} - ${item.name}" loading="lazy" width="320" height="220" onerror="this.style.display='none';this.parentElement.querySelector('.img-placeholder').style.display='flex'" />` :
            '';
        const shortDesc = item.desc.length > 60 ? item.desc.substring(0, 60) + '...' : item.desc;

        html += `
            <div class="product-card" data-id="${item.id}">
                <div class="img-box">
                    ${imgHtml}
                    ${!imgSrc ? `<div class="img-placeholder" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${getSvgPlaceholder()}</div>` :
                    `<div class="img-placeholder" style="display:none;align-items:center;justify-content:center;width:100%;height:100%;">${getSvgPlaceholder()}</div>`}
                    <span class="model-tag">${item.id}</span>
                    <button class="favorite-btn ${isFav?'active':''}" onclick="toggleFav('${item.id}')" title="${isFav?'Remove from favorites':'Add to favorites'}">
                        ${isFav ? '♥' : '♡'}
                    </button>
                    <input type="checkbox" class="product-check" onchange="toggleBatch('${item.id}')" ${checked} />
                </div>
                <div class="product-info">
                    <div class="product-name">${item.name}</div>
                    <div class="product-desc">${shortDesc}</div>
                    <div class="product-price">${item.price}</div>
                    <div class="card-actions">
                        <button class="order-btn" onclick="openProductModal('${item.id}')">${getLangText('viewDetails')}</button>
                        <button class="quick-whatsapp" onclick="quickWhatsApp('${item.id}')" title="Inquire via WhatsApp">💬</button>
                    </div>
                </div>
            </div>
        `;
    });

    container.insertAdjacentHTML('afterbegin', html);
    resultCount.textContent = total + ' products';
    updatePagination(total, totalPages);
    updateBatchBar();
    updateBreadcrumb();
}

// ============================================================
// 分页控件更新
// ============================================================
function updatePagination(total, totalPages) {
    pagePrev.disabled = currentPage <= 1;
    pageNext.disabled = currentPage >= totalPages;
    pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;

    let btnHtml = '';
    const maxShow = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxShow / 2));
    let endPage = Math.min(totalPages, startPage + maxShow - 1);
    if (endPage - startPage < maxShow - 1) startPage = Math.max(1, endPage - maxShow + 1);

    if (startPage > 1) {
        btnHtml += `<button onclick="goPage(1)">1</button>`;
        if (startPage > 2) btnHtml += `<span>…</span>`;
    }
    for (let i = startPage; i <= endPage; i++) {
        btnHtml += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    if (endPage < totalPages) {
        if (endPage < totalPages - 1) btnHtml += `<span>…</span>`;
        btnHtml += `<button onclick="goPage(${totalPages})">${totalPages}</button>`;
    }
    pageNumbers.innerHTML = btnHtml;
}

// ============================================================
// 跳转页面
// ============================================================
function goPage(page) {
    const list = getFilteredProducts();
    const totalPages = Math.ceil(list.length / CONFIG.PER_PAGE) || 1;
    if (page < 1) page = 1;
    if (page > totalPages) page = totalPages;
    currentPage = page;
    renderProducts();
    window.scrollTo({ top: document.getElementById('productContainer').offsetTop - 80, behavior: 'smooth' });
}

    const map = {

        'C': 'breadC'
    };
    const key = map[currentFilter] || 'breadAll';
    breadcrumbLabel.textContent = getLangText(key);
}

function toggleBatch(id) {
    if (batchSelected.has(id)) batchSelected.delete(id);
    else batchSelected.add(id);
    updateBatchBar();
    // 更新checkbox状态
    document.querySelectorAll('.product-check').forEach(cb => {
        const pid = cb.closest('.product-card')?.dataset.id;
        if (pid) cb.checked = batchSelected.has(pid);
    });
}

function updateBatchBar() {
    const count = batchSelected.size;
    batchCount.textContent = count;
    if (count > 0) {
        batchBar.classList.add('show');

    }
}

// ============================================================
function toggleFav(id) {
    const idx = favorites.indexOf(id);
    if (idx > -1) favorites.splice(idx, 1);
    else favorites.push(id);
    localStorage.setItem('favorites', JSON.stringify(favorites));
    // 刷新所有卡片上的收藏按钮状态
    document.querySelectorAll('.product-card').forEach(card => {
        const pid = card.dataset.id;
        if (pid === id) {
            const btn = card.querySelector('.favorite-btn');
            if (btn) {
                const isFav = favorites.includes(id);
                btn.classList.toggle('active', isFav);
                btn.textContent = isFav ? '♥' : '♡';
                btn.title = isFav ? 'Remove from favorites' : 'Add to favorites';
            }
        }
    });
    // 如果收藏弹窗打开则刷新
    if (document.getElementById('favModal').classList.contains('show')) {
        renderFavModal();
    }
}

function renderFavModal() {
    const list = document.getElementById('favList');
    if (favorites.length === 0) {
        list.innerHTML = `<p>${getLangText('noFav')}</p>`;
        return;
    }
    let html = '';
    favorites.forEach(id => {
        const p = PRODUCTS.find(p => p.id === id);
        if (!p) return;
        html += `<div class="fav-item"><span>${p.id} - ${p.name}</span><button class="fav-remove" onclick="removeFav('${id}')">✕</button></div>`;
    });
    list.innerHTML = html;
}

function removeFav(id) {
    const idx = favorites.indexOf(id);
    if (idx > -1) favorites.splice(idx, 1);
    localStorage.setItem('favorites', JSON.stringify(favorites));
    renderFavModal();
    renderProducts(); // 刷新卡片
}

function clearAllFavorites() {
    if (favorites.length === 0) return;
    if (confirm('Clear all favorites?')) {
        favorites = [];
        localStorage.setItem('favorites', JSON.stringify(favorites));
        renderFavModal();
        renderProducts();
    }
}

function submitInquiry(e) {
    e.preventDefault();
    // 简单人机验证：检查是否有填写任何字段，且随机数验证（内置简单防垃圾）
    const name = document.getElementById('inqName').value.trim();
    const email = document.getElementById('inqEmail').value.trim();
    if (!name || !email) {
        showToast('Please fill in name and email.');
        return;
    }
    // 随机验证（简单防机器人）
    const rand = Math.floor(Math.random() * 10);
    if (rand < 3) {
        showToast('Please try again (security check)');
        return;
    }
    const company = document.getElementById('inqCompany').value.trim();
    const qty = document.getElementById('inqQty').value.trim();
    const size = document.getElementById('inqSize').value.trim();
    const msg = document.getElementById('inqMessage').value.trim();
    let inquiryMsg = `New Inquiry from ${name}\n`;
    if (company) inquiryMsg += `Company: ${company}\n`;
    inquiryMsg += `Email: ${email}\n`;
    if (qty) inquiryMsg += `Quantity: ${qty} pcs\n`;
    if (size) inquiryMsg += `Requirements: ${size}\n`;
    if (msg) inquiryMsg += `Message: ${msg}\n`;
    inquiryMsg += `\nPlease reply to my inquiry.`;
    const url = `https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(inquiryMsg)}`;
    window.open(url, '_blank');
    closeInquiryModal();
    document.getElementById('inquiryForm').reset();
}

function getLangText(key) {
    const lang = currentLang || 'en';
    return LANG[lang] && LANG[lang][key] ? LANG[lang][key] : LANG['en'][key] || key;
}

function applyLangToUI() {
    // 更新所有带有 data-lang-key 的元素
    document.querySelectorAll('[data-lang-key]').forEach(el => {
        const key = el.dataset.langKey;
        el.textContent = getLangText(key);
    });
    // 更新搜索占位
    const input = document.getElementById('searchInput');
    if (input) input.placeholder = getLangText('search');
    // 更新分类标签
    const tabs = document.querySelectorAll('.filter-tab');
    const map = { 'all': 'all', 'A': 'led', 'B': 'smart', 'C': 'pvc' };
    tabs.forEach(tab => {
        const key = map[tab.dataset.filter];
        if (key) tab.textContent = getLangText(key);
    });
    // 更新面包屑
    updateBreadcrumb();
    // 更新OEM内容
    applyLangToOEM();
    // 更新FAQ
    document.querySelectorAll('.faq-item').forEach((item, idx) => {
        const q = item.querySelector('.faq-q');
        const a = item.querySelector('.faq-a');
        if (q && a) {
            const qKey = 'faq' + (idx+1) + 'q';
            const aKey = 'faq' + (idx+1) + 'a';
            q.childNodes[0].textContent = getLangText(qKey);
            a.textContent = getLangText(aKey);
        }
    });
    // 更新页脚
    document.querySelectorAll('[data-lang-key]').forEach(el => {
        const key = el.dataset.langKey;
        el.textContent = getLangText(key);
    });
    // 重新渲染产品（以更新按钮文字）
    renderProducts();
}

function applyLangToOEM() {
    const modal = document.getElementById('oemModal');
    if (!modal) return;
    const title = modal.querySelector('.modal-title');
    if (title) title.textContent = getLangText('oemTitle');
    const items = modal.querySelectorAll('.oem-item');
    const oemKeys = ['oemSize', 'oemSizeDesc', 'oemLogo', 'oemLogoDesc', 'oemLight', 'oemLightDesc', 'oemFunc', 'oemFuncDesc', 'oemPack', 'oemPackDesc'];
    items.forEach((item, idx) => {
        const h4 = item.querySelector('h4');
        const p = item.querySelector('p');
        if (h4) h4.textContent = getLangText(oemKeys[idx*2]);
        if (p) p.textContent = getLangText(oemKeys[idx*2+1]);
    });
    const info = modal.querySelector('.oem-info');
    if (info) {
        const ps = info.querySelectorAll('p');
        if (ps.length >= 4) {
            ps[0].textContent = getLangText('oemInfo1');
            ps[1].textContent = getLangText('oemInfo2');
            ps[2].textContent = getLangText('oemInfo3');
            ps[3].textContent = getLangText('oemInfo4');
        }
    }
    const btn = modal.querySelector('.whatsapp-btn');
    if (btn) btn.textContent = getLangText('getQuote');
}

function switchLang(lang) {
    if (lang === currentLang) return;
    currentLang = lang;
    localStorage.setItem('yl_lang', lang);
    document.querySelectorAll('.lang-switch button').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
    });
    applyLangToUI();
}

function toggleDarkMode() {
    darkMode = !darkMode;
    localStorage.setItem('yl_dark', String(darkMode));
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
    document.querySelector('#themeToggle').textContent = darkMode ? '☀️' : '🌓';
}

// ============================================================
// 滚动节流 & 搜索防抖
// ============================================================
const handleScroll = throttle(function() {
    const header = document.getElementById('siteHeader');
    if (header) {
        if (window.scrollY > 50) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
    }
    const backTop = document.getElementById('backTop');
    if (backTop) {
        if (window.scrollY > 300) backTop.classList.add('show');
        else backTop.classList.remove('show');
    }
}, 100);

const handleSearch = debounce(function() {
    searchKeyword = this.value;
    currentPage = 1;
    renderProducts();
}, 300);

// ============================================================
// ESC关闭弹窗
// ============================================================
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        // 关闭所有打开的弹窗
        document.querySelectorAll('.modal-mask.show').forEach(modal => {
            // 根据ID调用对应的关闭函数
            if (modal.id === 'productModal') closeProductModal();
            else if (modal.id === 'oemModal') closeOEMModal();
            else if (modal.id === 'inquiryModal') closeInquiryModal();
            else if (modal.id === 'favModal') closeFavModal();
            else if (modal.id === 'catalogModal') closeCatalogModal();
            else modal.classList.remove('show');
            document.body.classList.remove('no-scroll');
        });
    }
});

// ============================================================
// 点击遮罩关闭弹窗 (仅点击modal-mask本身)
// ============================================================
document.querySelectorAll('.modal-mask').forEach(mask => {
    mask.addEventListener('click', function(e) {
        if (e.target === this) {
            // 触发关闭
            const id = this.id;
            if (id === 'productModal') closeProductModal();
            else if (id === 'oemModal') closeOEMModal();
            else if (id === 'inquiryModal') closeInquiryModal();
            else if (id === 'favModal') closeFavModal();
            else if (id === 'catalogModal') closeCatalogModal();
            else {
                this.classList.remove('show');
                document.body.classList.remove('no-scroll');
            }
        }
    });
});

// ============================================================
// 页面初始化
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    // 暗黑模式恢复
    if (darkMode) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.querySelector('#themeToggle').textContent = '☀️';
    } else {
        document.querySelector('#themeToggle').textContent = '🌓';
    }

    // 语言恢复
    const langBtn = document.querySelector(`.lang-switch button[data-lang="${currentLang}"]`);
    if (langBtn) {
        document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
        langBtn.classList.add('active');
    }
    applyLangToUI();

    // 绑定搜索事件
    searchInput.addEventListener('input', handleSearch);

    // 绑定分类标签
    filterTabs.forEach(tab => {
        tab.addEventListener('click', function() {
            filterTabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            currentPage = 1;
            renderProducts();
        });
    });

    // 分页按钮
    pagePrev.addEventListener('click', () => { if (currentPage > 1) goPage(currentPage - 1); });
    pageNext.addEventListener('click', () => { goPage(currentPage + 1); });

    // 滚动监听
    window.addEventListener('scroll', handleScroll);

    // 主题切换
    document.getElementById('themeToggle').addEventListener('click', toggleDarkMode);

    // 语言切换
    document.querySelectorAll('.lang-switch button').forEach(btn => {
        btn.addEventListener('click', function() {
            switchLang(this.dataset.lang);
        });
    });

    // 初始化工厂相册
    initGallery();

    // 首次渲染
    renderProducts();
});
